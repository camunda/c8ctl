name: Test

on:

  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unit-test:
    name: Unit Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  integration-test:
    name: Integration Test (Node ${{ matrix.node }} / Camunda ${{ matrix.camunda }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
        camunda: ['8.8', '8.9']
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install Podman (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install podman docker-compose
          podman machine init --memory 4096 --cpus 2
          podman machine start
          # Symlink podman as docker for compose compatibility
          sudo ln -sf $(which podman) /usr/local/bin/docker

      - name: Install Docker (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install docker-desktop -y --no-progress
          & "C:\Program Files\Docker\Docker\Docker Desktop.exe"
          $timeout = 120
          $elapsed = 0
          while ($elapsed -lt $timeout) {
            try {
              docker info 2>&1 | Out-Null
              if ($LASTEXITCODE -eq 0) { Write-Host "Docker is ready"; break }
            } catch {}
            Start-Sleep -Seconds 5
            $elapsed += 5
            Write-Host "Waiting for Docker... ($elapsed s)"
          }

      - name: Install dependencies
        run: npm ci

      - name: Start Camunda ${{ matrix.camunda }} with Docker Compose
        working-directory: assets/c8/${{ matrix.camunda }}
        run: docker compose up -d

      - name: Wait for Camunda to be ready
        shell: bash
        run: |
          echo "Waiting for Camunda at localhost:8080..."
          # First wait for topology endpoint
          for i in {1..60}; do
            if curl -s -f -u demo:demo http://localhost:8080/v2/topology > /dev/null; then
              echo "Topology endpoint is ready!"
              break
            fi
            echo "Attempt $i: Topology not ready yet, waiting..."
            sleep 5
          done
          
          # Then wait an additional 30 seconds for broker to fully initialize
          echo "Waiting additional time for broker to initialize..."
          sleep 30
          
          # Verify we can actually deploy
          echo "Testing deployment capability..."
          for i in {1..30}; do
            if curl -s -u demo:demo http://localhost:8080/v2/topology | grep -q '"health":"healthy"'; then
              echo "Broker is healthy, ready for deployments!"
              exit 0
            fi
            echo "Attempt $i: Broker not fully ready, waiting..."
            sleep 2
          done
          
          echo "Camunda may not be fully ready, but continuing with tests..."

      - name: Run integration tests
        run: npm run test:integration
        env:
          CAMUNDA_VERSION: ${{ matrix.camunda }}

      - name: Stop Camunda
        if: always()
        working-directory: assets/c8/${{ matrix.camunda }}
        run: docker compose down -v

      - name: Show Camunda logs on failure
        if: failure()
        working-directory: assets/c8/${{ matrix.camunda }}
        run: docker compose logs
