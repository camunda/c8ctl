name: Test

on:

  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  breaking-change-commit-check:
    name: Breaking Change Commit Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect breaking-change commit markers
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          commits="$(git rev-list --reverse "${BASE_SHA}..${HEAD_SHA}")"
          offenders=()

          while IFS= read -r sha; do
            [ -z "$sha" ] && continue
            subject="$(git log -1 --format=%s "$sha")"
            body="$(git log -1 --format=%b "$sha")"

            if printf '%s\n' "$subject" | grep -Eq '^[[:alpha:]][[:alnum:]-]*(\([^)]+\))?!:[[:space:]]*'; then
              offenders+=("${sha}|${subject}")
              continue
            fi

            if printf '%s\n' "$body" | grep -Eiq '^BREAKING CHANGES?:[[:space:]]*'; then
              offenders+=("${sha}|${subject}")
            fi
          done <<< "$commits"

          if [ "${#offenders[@]}" -gt 0 ]; then
            echo "Found Conventional Commit breaking-change markers in this PR:"
            for offender in "${offenders[@]}"; do
              sha="${offender%%|*}"
              subject="${offender#*|}"
              echo " - ${sha}: ${subject}"
            done

            echo "Please rewrite PR history to remove breaking-change commit markers before merging to main."
            exit 1
          fi

          echo "No breaking-change commit markers found in this PR."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  unit-test:
    name: Unit Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    needs: [lint, typecheck]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  integration-test:
    name: Integration Test (Node ${{ matrix.node }} / Camunda ${{ matrix.camunda }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
        camunda: ['8.8', '8.9']
        os: [ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start Camunda ${{ matrix.camunda }} with Docker Compose
        working-directory: assets/c8/${{ matrix.camunda }}
        run: docker compose up -d

      - name: Wait for Camunda to be ready
        shell: bash
        run: |
          echo "Waiting for Camunda at localhost:8080..."
          # First wait for topology endpoint
          for i in {1..60}; do
            if curl -s -f -u demo:demo http://localhost:8080/v2/topology > /dev/null; then
              echo "Topology endpoint is ready!"
              break
            fi
            echo "Attempt $i: Topology not ready yet, waiting..."
            sleep 5
          done
          
          # # Then wait an additional 30 seconds for broker to fully initialize
          # echo "Waiting additional time for broker to initialize..."
          # # let's try removing this and rely on topology detecting health instead
          # sleep 30 
          
          # Verify we can actually deploy
          echo "Testing deployment capability..."
          for i in {1..30}; do
            if curl -s -u demo:demo http://localhost:8080/v2/topology | grep -q '"health":"healthy"'; then
              echo "Broker is healthy, ready for deployments!"
              exit 0
            fi
            echo "Attempt $i: Broker not fully ready, waiting..."
            sleep 2
          done
          
          echo "Camunda may not be fully ready, but continuing with tests..."

      - name: Run integration tests
        run: npm run test:integration
        env:
          CAMUNDA_VERSION: ${{ matrix.camunda }}

      - name: Show Camunda logs on failure
        if: failure()
        working-directory: assets/c8/${{ matrix.camunda }}
        run: docker compose logs

      - name: Stop Camunda
        if: always()
        working-directory: assets/c8/${{ matrix.camunda }}
        run: docker compose down -v
