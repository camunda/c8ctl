name: Test

on:

  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  unit-test:
    name: Unit Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  integration-test:
    name: Integration Test (Node ${{ matrix.node }} / Camunda ${{ matrix.camunda }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
        camunda: ['8.8', '8.9']
        os: [ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start Camunda ${{ matrix.camunda }} with Docker Compose
        working-directory: assets/c8/${{ matrix.camunda }}
        run: docker compose up -d

      - name: Wait for Camunda to be ready
        shell: bash
        run: |
          echo "Waiting for Camunda at localhost:8080..."
          # First wait for topology endpoint
          for i in {1..60}; do
            if curl -s -f -u demo:demo http://localhost:8080/v2/topology > /dev/null; then
              echo "Topology endpoint is ready!"
              break
            fi
            echo "Attempt $i: Topology not ready yet, waiting..."
            sleep 5
          done
          
          # # Then wait an additional 30 seconds for broker to fully initialize
          # echo "Waiting additional time for broker to initialize..."
          # # let's try removing this and rely on topology detecting health instead
          # sleep 30 
          
          # Verify we can actually deploy
          echo "Testing deployment capability..."
          for i in {1..30}; do
            if curl -s -u demo:demo http://localhost:8080/v2/topology | grep -q '"health":"healthy"'; then
              echo "Broker is healthy, ready for deployments!"
              exit 0
            fi
            echo "Attempt $i: Broker not fully ready, waiting..."
            sleep 2
          done
          
          echo "Camunda may not be fully ready, but continuing with tests..."

      - name: Run integration tests
        run: npm run test:integration
        env:
          CAMUNDA_VERSION: ${{ matrix.camunda }}

      - name: Show Camunda logs on failure
        if: failure()
        working-directory: assets/c8/${{ matrix.camunda }}
        run: docker compose logs

      - name: Stop Camunda
        if: always()
        working-directory: assets/c8/${{ matrix.camunda }}
        run: docker compose down -v
